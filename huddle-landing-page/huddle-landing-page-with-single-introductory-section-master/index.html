<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>
      Frontend Mentor | Huddle landing page with single introductory section
    </title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      body {
        background: hsl(257, 40%, 49%);
        background-image: url("./images/bg-desktop.svg");
        color: white;
        font-family: "https://fonts.google.com/specimen/Open+Sans";
        font-weight: 400;
      }

      .layout {
        display: flex;
        align-items: center;
        gap: 45px;
      }

      .attribution {
        font-size: 11px;
        text-align: center;
      }

      .attribution a {
        color: hsl(228, 45%, 44%);
      }

      .btn {
        display: block;
        margin: 0 auto;
        padding-left: 35px;
        padding-right: 35px;
        padding-top: 10px;
        padding-bottom: 10px;
        border: none;
        border-radius: 50px;
        color: hsl(257, 40%, 49%);
      }

      .heading {
        font-family: "Open Sans", sans-serif;
        font-size: 30px;
      }

      .icons {
        width: 30px;
        float: right;
        margin: 6px;
      }

      .icons-formatting {
        padding-right: 43px;
      }
      @media screen and (max-width: 1000px) {
        body {
          background: hsl(257, 40%, 49%);
          background-image: url("./images/bg-mobile.svg");
          color: white;
          font-family: "https://fonts.google.com/specimen/Open+Sans";
          background-repeat: no-repeat;
          /* font-weight: 400; */
        }
        .responsive-text {
          display: inline-block;
          margin-top: 4px;

          margin-right: 30px;
          margin-left: 55px;
        }
        .heading {
          margin: 0;
          font-size: 23px;
          margin-top: 23px;
        }
        .layout {
          display: block;
        }
        .responsive-image {
          margin-top: 27px;
          margin-bottom: 10px;
          width: 76%;
          margin-left: 44px;
          height: 40%;
        }
        .logo {
          width: 118px;
          margin-top: 16px;
          margin-left: 13px;
        }
        .icons-formatting {
          display: flex;
          justify-content: center;
          padding: 0;
          margin: 0;
        }
        .icons {
          display: flex;
          width: 19px;
          margin: 6px;
          margin-top: 16px;
          fill:rgb(146, 130, 130);
        }
        .landing-text {
          font-family: "Open Sans", sans-serif;
          font-size: 16px;
        }
        .btn {
          display: block;
          margin: 0 auto;
          padding-left: 85px;
          padding-right: 85px;
          padding-top: 10px;
          padding-bottom: 10px;
          border: none;
          border-radius: 50px;
          color: hsl(257, 40%, 49%);
         
        }
      }
      .btn:hover{
        background:hsl(300, 69%, 71%);
        color: white;
      }
           

  .fa-brands{
  font-size: 20px;
  color: white;
   }
  .fa-brands:hover{
 color: hsl(300, 69%, 71%);
   }
    </style>
  </head>

  <body>
    <div class="logo">
      <img
        class="logo"
        src="/huddle-landing-page/huddle-landing-page-with-single-introductory-section-master/images/logo.svg"
        alt="logo"
      />
    </div>

    <div class="image layout">
      <img
        src="./images/illustration-mockups.svg"
        alt=""
        class="responsive-image"
      />

      <div class="responsive-text">
        <h2 class="heading">Build The Community Your Fans Will Love</h2>
        <p class="landing-text">
          Huddle re-imagines the way we build communities. You have a voice, but
          so does your audience. Create connections with your users as you
          engage in genuine discussion.
        </p>
        <button class="btn">Register</button>
      </div>
    </div>

    <div class="icons-formatting">
      
    <i class=" icons fa-brands fa-twitter" ></i>
     <i class=" icons fa-brands fa-facebook" ></i>
      <i class=" icons fa-brands fa-instagram" ></i>
      
    </div>
    <footer>
      <p class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by <a href="#">Laiba Arooj</a>.
      </p>
    </footer>
  </body>
</html>
